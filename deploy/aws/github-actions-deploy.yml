name: Deploy DoctaRx Pilot Presentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      S3_PREFIX: ng-presentation
      VITE_BASE_PATH: /ng-presentation/
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          S3_PREFIX="${S3_PREFIX#/}"
          S3_PREFIX="${S3_PREFIX%/}"
          aws s3 sync dist "s3://${{ secrets.S3_BUCKET }}/${S3_PREFIX}" --delete --cache-control "public,max-age=300"
          aws s3 cp dist/assets "s3://${{ secrets.S3_BUCKET }}/${S3_PREFIX}/assets" --recursive --cache-control "public,max-age=31536000,immutable" --metadata-directive REPLACE || true

      - name: Invalidate CloudFront
        run: |
          S3_PREFIX="${S3_PREFIX#/}"
          S3_PREFIX="${S3_PREFIX%/}"
          if [ -n "${CLOUDFRONT_DISTRIBUTION_ID}" ]; then
            aws cloudfront create-invalidation --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" --paths "/${S3_PREFIX}/*"
          else
            echo "CLOUDFRONT_DISTRIBUTION_ID not set; skipping invalidation."
          fi
