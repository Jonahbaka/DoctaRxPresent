name: Deploy DoctaRx Pilot Presentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: ${{ secrets.VITE_BASE_PATH || '/ng-presentation/' }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          S3_PREFIX="${{ secrets.S3_PREFIX || 'ng-presentation' }}"
          S3_PREFIX="${S3_PREFIX#/}"
          S3_PREFIX="${S3_PREFIX%/}"
          aws s3 sync dist "s3://${{ secrets.S3_BUCKET }}/${S3_PREFIX}" --delete --cache-control "public,max-age=300"
          aws s3 cp dist/assets "s3://${{ secrets.S3_BUCKET }}/${S3_PREFIX}/assets" --recursive --cache-control "public,max-age=31536000,immutable" --metadata-directive REPLACE || true

      - name: Invalidate CloudFront
        if: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          S3_PREFIX="${{ secrets.S3_PREFIX || 'ng-presentation' }}"
          S3_PREFIX="${S3_PREFIX#/}"
          S3_PREFIX="${S3_PREFIX%/}"
          aws cloudfront create-invalidation --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/${S3_PREFIX}/*"
